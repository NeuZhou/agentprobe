name: 'AgentProbe - AI Agent Testing'
description: 'Run AgentProbe test suites in CI with budget limits and regression detection'
author: 'NeuZhou'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  suite:
    description: 'Path to test suite file or directory'
    required: true
    default: 'tests/'
  budget:
    description: 'Maximum budget in USD'
    required: false
    default: '5.00'
  fail_on_regression:
    description: 'Fail if regression detected against baseline'
    required: false
    default: 'true'
  format:
    description: 'Output format (console, json, markdown, junit)'
    required: false
    default: 'junit'
  node_version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  agentprobe_version:
    description: 'AgentProbe version (latest if not specified)'
    required: false
    default: 'latest'
  tags:
    description: 'Filter tests by tags (comma-separated)'
    required: false
  env_file:
    description: 'Path to .env file for test environment'
    required: false
  baseline:
    description: 'Path to baseline file for regression detection'
    required: false

outputs:
  passed:
    description: 'Number of passed tests'
  failed:
    description: 'Number of failed tests'
  total:
    description: 'Total number of tests'
  duration_ms:
    description: 'Total duration in milliseconds'
  report_path:
    description: 'Path to generated report file'
  regression_detected:
    description: 'Whether a regression was detected'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Install AgentProbe
      shell: bash
      run: |
        if [ "${{ inputs.agentprobe_version }}" = "latest" ]; then
          npm install -g @neuzhou/agentprobe
        else
          npm install -g @neuzhou/agentprobe@${{ inputs.agentprobe_version }}
        fi

    - name: Load environment
      if: inputs.env_file != ''
      shell: bash
      run: |
        if [ -f "${{ inputs.env_file }}" ]; then
          set -a
          source "${{ inputs.env_file }}"
          set +a
        fi

    - name: Run tests
      id: run-tests
      shell: bash
      run: |
        ARGS="--format ${{ inputs.format }} --max-cost ${{ inputs.budget }}"
        if [ -n "${{ inputs.tags }}" ]; then
          ARGS="$ARGS --tags ${{ inputs.tags }}"
        fi
        REPORT_PATH="agentprobe-results.${{ inputs.format == 'junit' && 'xml' || 'json' }}"
        ARGS="$ARGS --output $REPORT_PATH"

        agentprobe run ${{ inputs.suite }} $ARGS 2>&1 | tee agentprobe-output.log
        EXIT_CODE=${PIPESTATUS[0]}

        echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT

        # Parse results from JSON output
        if [ -f "$REPORT_PATH" ]; then
          if [[ "$REPORT_PATH" == *.json ]]; then
            echo "passed=$(jq -r '.passed // 0' $REPORT_PATH)" >> $GITHUB_OUTPUT
            echo "failed=$(jq -r '.failed // 0' $REPORT_PATH)" >> $GITHUB_OUTPUT
            echo "total=$(jq -r '.total // 0' $REPORT_PATH)" >> $GITHUB_OUTPUT
            echo "duration_ms=$(jq -r '.duration_ms // 0' $REPORT_PATH)" >> $GITHUB_OUTPUT
          fi
        fi

        exit $EXIT_CODE

    - name: Check regression
      if: inputs.fail_on_regression == 'true' && inputs.baseline != ''
      shell: bash
      run: |
        if [ -f "${{ inputs.baseline }}" ]; then
          RESULT=$(agentprobe regression compare "${{ inputs.baseline }}" "${{ steps.run-tests.outputs.report_path }}" 2>&1)
          if echo "$RESULT" | grep -q "REGRESSION"; then
            echo "regression_detected=true" >> $GITHUB_OUTPUT
            echo "::error::Regression detected!"
            echo "$RESULT"
            exit 1
          else
            echo "regression_detected=false" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: agentprobe-results
        path: |
          ${{ steps.run-tests.outputs.report_path }}
          agentprobe-output.log
