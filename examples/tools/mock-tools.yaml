# Mock Tools — Deterministic testing with mocked tool responses
# Replace real tool calls with predefined responses for reproducible tests.

name: "Mock Tools"
description: "Test agent behavior with mocked tool responses"

tests:
  - name: Agent uses mocked weather data for Tokyo
    input: "What's the weather like in Tokyo?"
    tags: [mock, weather]
    expect:
      tool_called: get_weather
      output_contains: ["sunny", "22"]
      tool_args_match:
        get_weather:
          location: "Tokyo"

  - name: Agent uses mocked weather data for London
    input: "How about London?"
    tags: [mock, weather]
    expect:
      tool_called: get_weather
      output_contains: "rainy"
