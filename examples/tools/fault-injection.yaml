# Fault Injection — Test how agents handle tool failures
# Simulate errors, timeouts, and malformed responses from tools.

name: "Fault Injection"
description: "Verify agent gracefully handles tool failures"

tests:
  - name: Agent handles tool timeout
    input: "Look up user ID 12345"
    tags: [fault, timeout]
    faults:
      db_lookup:
        type: timeout
        delay_ms: 30000
    expect:
      output_not_contains: ["exception", "stack trace"]
      judge:
        criteria: "The agent acknowledges the lookup failed and offers alternatives or asks to retry"
        threshold: 0.7

  - name: Agent handles server error
    input: "Try again please"
    tags: [fault, error]
    faults:
      db_lookup:
        type: error
        message: "Internal server error: connection refused"
    expect:
      output_not_contains: "500"
      judge:
        criteria: "The agent explains there was an issue without exposing raw error details"
        threshold: 0.7

  - name: Agent handles malformed response
    input: "One more time"
    tags: [fault, malformed]
    faults:
      db_lookup:
        type: corrupt
    expect:
      output_not_contains: "invalid json"
