# Anthropic Adapter Configuration
# Configure AgentProbe to test agents using Anthropic Claude models.

name: "Anthropic Adapter Example"
description: "Test an agent using Anthropic Claude models"

config:
  timeout_ms: 60000

tests:
  - name: Agent writes and runs Python code
    input: "Write a Python hello world and run it"
    tags: [anthropic, tool-use]
    expect:
      tool_called: run_code
      output_contains: "Hello"
      tool_args_match:
        run_code:
          language: "python"
      judge:
        criteria: "The assistant writes valid Python code and shows the execution result"
        threshold: 0.8
