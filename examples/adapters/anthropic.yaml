# Anthropic Adapter Configuration
# Configure AgentProbe to test agents using Anthropic Claude models.

name: "Anthropic Adapter Example"
description: "Test an agent using Anthropic Claude models"

agent:
  adapter: anthropic
  model: claude-sonnet-4-20250514    # or claude-3-haiku, claude-3-opus, etc.

  # Connection settings
  connection:
    api_key: ${ANTHROPIC_API_KEY}     # From environment variable
    # base_url: https://api.anthropic.com  # Default
    timeout_ms: 60000                  # Claude can be slower for complex tasks
    max_retries: 2

  # Model parameters
  parameters:
    temperature: 0.1
    max_tokens: 2048
    # top_k: 40                        # Anthropic-specific parameter

  # System prompt
  system: "You are a helpful coding assistant. Provide clear, working code examples."

  # Tool definitions (Anthropic tool_use format — AgentProbe normalizes this)
  tools:
    - name: run_code
      description: "Execute a code snippet and return the output"
      parameters:
        type: object
        properties:
          language:
            type: string
            enum: [python, javascript, typescript]
          code:
            type: string
        required: [language, code]

mocks:
  run_code:
    - when: { language: "python" }
      respond:
        stdout: "Hello, World!\n"
        stderr: ""
        exit_code: 0

steps:
  - send: "Write a Python hello world and run it"
    assert:
      - type: tool-called
        name: run_code
        args:
          language: "python"
      - type: contains
        value: "Hello"
      - type: llm-judge
        criteria: "The assistant writes valid Python code and shows the execution result"
        threshold: 0.8
