# OpenAI Adapter Configuration
# Configure AgentProbe to test agents using OpenAI models.

name: "OpenAI Adapter Example"
description: "Test an agent using OpenAI GPT models"

config:
  timeout_ms: 30000

tests:
  - name: Agent uses get_time tool
    input: "What time is it in New York?"
    tags: [openai, tool-use]
    expect:
      tool_called: get_time
      output_contains: "10:30"
      tool_args_match:
        get_time:
          timezone: "America/New_York"
