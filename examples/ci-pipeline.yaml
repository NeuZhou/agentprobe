# CI Pipeline Configuration
# Example GitHub Actions workflow for running AgentProbe in CI/CD.

name: Agent Tests
description: Example CI/CD workflow for running AgentProbe in GitHub Actions
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am

env:
  NODE_VERSION: '20'

jobs:
  agent-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate test suites
        run: npx agentprobe validate tests/

      - name: Run agent tests
        run: npx agentprobe run tests/ -f junit -o results.xml --badge badge.svg

      - name: Run security tests
        run: npx agentprobe run tests/ --tag security -f json -o security-results.json

      - name: Check regression baselines
        run: npx agentprobe baseline compare

      - name: Upload test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: AgentProbe Results
          path: results.xml
          reporter: java-junit

      - name: Upload badge
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: test-badge
          path: badge.svg

  security-audit:
    runs-on: ubuntu-latest
    needs: agent-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate security suite
        run: npx agentprobe generate-security -o tests/generated-security.yaml

      - name: Run security audit
        run: npx agentprobe run tests/generated-security.yaml -f json -o security-audit.json

      - name: Compute safety score
        run: npx agentprobe safety-score traces/ -f json -o safety-score.json

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: |
            security-audit.json
            safety-score.json

  performance:
    runs-on: ubuntu-latest
    needs: agent-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Profile performance
        run: npx agentprobe profile traces/ -f json -o perf-report.json

      - name: Check for performance regressions
        run: npx agentprobe baseline compare --threshold 10
