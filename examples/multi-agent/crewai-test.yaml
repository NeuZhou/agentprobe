# CrewAI Multi-Agent Testing - Test a crew of specialized agents
# Tests agent collaboration, delegation, and output quality in CrewAI setups.

name: "CrewAI Research Crew Test"
description: "Test a CrewAI crew that researches a topic and writes a report"

tests:
  - name: Researcher searches and produces findings
    input: "Research the current state of AI agent testing frameworks"
    tags: [multi-agent, crewai, research]
    expect:
      tool_called: web_search
      output_contains: "testing"
      judge:
        criteria: "Output is structured research findings with bullet points, not a narrative"
        threshold: 0.8

  - name: Writer produces report from findings
    input: "Write a report based on the research findings"
    tags: [multi-agent, crewai, writing]
    expect:
      max_tokens: 2000
      output_not_contains: "I don't have"
      judge:
        criteria: "Output is a well-structured report based on the research findings, not new fabricated data"
        threshold: 0.8

  - name: Reviewer evaluates the report
    input: "Review the report for accuracy and completeness"
    tags: [multi-agent, crewai, review]
    expect:
      output_matches: "(APPROVED|NEEDS_REVISION)"
      judge:
        criteria: "The review evaluates the report for accuracy and flags any unsupported claims"
        threshold: 0.8

  - name: Crew completes within budget
    input: "Research AI testing frameworks"
    tags: [multi-agent, crewai, budget]
    expect:
      max_steps: 10
      max_cost_usd: 0.50
