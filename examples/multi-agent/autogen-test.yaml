# AutoGen Multi-Agent Conversation Testing
# Tests an AutoGen-style group chat where agents discuss and solve problems together.

name: "AutoGen Group Chat Test"
description: "Test an AutoGen-style multi-agent group chat for code review"

tests:
  - name: Coder writes the solution
    input: "Write a Python function that validates email addresses using regex"
    tags: [multi-agent, autogen, coding]
    expect:
      output_contains: "def"
      output_matches: "import re|re\\."
      judge:
        criteria: "Code includes type hints, handles edge cases, and has docstrings"
        threshold: 0.7

  - name: Critic reviews the code
    input: "Review the code for bugs, security issues, and best practices"
    tags: [multi-agent, autogen, review]
    expect:
      output_matches: "(APPROVE|REQUEST_CHANGES|NEEDS_DISCUSSION)"
      judge:
        criteria: "Review is constructive and checks for security, edge cases, and code quality"
        threshold: 0.8

  - name: Coder revises based on feedback
    input: "Revise the code based on the reviewer's feedback"
    tags: [multi-agent, autogen, revision]
    expect:
      judge:
        criteria: "If revising, the code addresses the critic's feedback"
        threshold: 0.7

  - name: Conversation completes within step budget
    input: "Write and review a Python email validator"
    tags: [multi-agent, autogen, budget]
    expect:
      max_steps: 8
