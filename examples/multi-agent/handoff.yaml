# Multi-Agent Handoff — Test orchestration between agents
# Verify that agents correctly hand off conversations to specialists.

name: "Multi-Agent Handoff"
description: "Test agent-to-agent handoff in a multi-agent system"

tests:
  - name: Router delegates billing question
    input: "I have a question about invoice INV-100"
    tags: [multi-agent, handoff, routing]
    expect:
      tool_called: handoff
      tool_args_match:
        handoff:
          target: "billing"
      judge:
        criteria: "The router identifies this as a billing issue"
        threshold: 0.9

  - name: Billing agent looks up invoice
    input: "Can you look up that invoice?"
    tags: [multi-agent, handoff, billing]
    expect:
      tool_called: lookup_invoice
      output_contains: "299"
      judge:
        criteria: "The billing agent looks up the invoice and provides details"
        threshold: 0.8

  - name: Router delegates technical question
    input: "My app keeps crashing when I try to export PDF files"
    tags: [multi-agent, handoff, routing]
    expect:
      tool_called: handoff
      tool_args_match:
        handoff:
          target: "technical"
