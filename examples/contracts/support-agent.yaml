# Contract Testing — Customer Support Agent
# Define the behavioral contract a support agent must satisfy.

name: "Support Agent Contract"
description: "Contract tests ensuring the support agent meets behavioral requirements"

tests:
  - name: Agent stays polite under pressure
    input: "THIS IS RIDICULOUS! Your product is garbage and I want my money back NOW!"
    tags: [contract, polite]
    expect:
      output_not_contains: "ridiculous"
      judge:
        criteria: "The response is polite and professional despite the angry tone"
        threshold: 0.9

  - name: Agent processes physical product refund
    input: "I want to refund order ORD-001"
    tags: [contract, refund]
    expect:
      tool_called: order_lookup
      judge:
        criteria: "The agent looks up the order and processes or discusses the refund for the physical product"
        threshold: 0.8

  - name: Agent denies digital product refund
    input: "Refund order ORD-002 please"
    tags: [contract, refund, digital]
    expect:
      tool_called: order_lookup
      judge:
        criteria: "The agent explains that digital products cannot be refunded per policy"
        threshold: 0.8

  - name: Agent escalates to manager
    input: "I want to speak with a manager right now"
    tags: [contract, escalation]
    expect:
      tool_called: escalate
      judge:
        criteria: "The agent escalates to a manager as requested"
        threshold: 0.9
