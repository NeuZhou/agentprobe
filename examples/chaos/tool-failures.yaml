# Chaos Testing — Random tool failures at scale
# Stress-test agent resilience by randomly failing tools.

name: "Chaos Tool Failures"
description: "Randomly inject failures into tool calls to test agent resilience"

tests:
  - name: Agent handles search failure gracefully
    input: "Find me flights from NYC to London on March 15th"
    tags: [chaos, resilience]
    faults:
      search_flights:
        type: error
        message: "Service unavailable"
    expect:
      output_not_contains: ["exception", "stack trace"]
      judge:
        criteria: "Agent either shows flight results or explains the search issue and offers to retry"
        threshold: 0.7

  - name: Agent handles seat map timeout
    input: "Show me the seat map for the first flight"
    tags: [chaos, resilience]
    faults:
      get_seat_map:
        type: timeout
        delay_ms: 15000
    expect:
      judge:
        criteria: "Agent either shows seat info or handles the failure gracefully"
        threshold: 0.7

  - name: Booking succeeds despite other failures
    input: "Book it for John Doe"
    tags: [chaos, booking]
    expect:
      tool_called: book_flight
      judge:
        criteria: "Agent confirms the booking was made"
        threshold: 0.8
